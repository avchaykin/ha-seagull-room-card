# Seagull Room Card Theme (draft)
#
# Purpose: keep all visual defaults in one place so you can switch themes quickly.
# This file is a proposed format (does NOT auto-apply until we wire loader/support in card code).

seagull_room_theme:
  name: "default"

  card:
    background_color: "#eeeeee"
    border_color: "#aaaaaa"
    icon_color: "#2233aa44"

  text:
    color: "inherit"
    background_color: "transparent"

  buttons:
    icon_only:
      background: "#e5e7eb"
      icon_color: "#9ca3af"

    unavailable:
      background: "#6b7280"
      icon_color: "#d1d5db"

    toggle:
      active:
        background: "#f59e0b"
        icon_color: "#111827"
      inactive:
        background: "#4b5563"
        icon_color: "#e5e7eb"

    non_toggle:
      active:
        background: "#3b82f6"
        icon_color: "#eaf2ff"
      inactive:
        background: "#d1d5db"
        icon_color: "#111827"

    border:
      default_color: "transparent"

  obsolete:
    border: 2
    border_color: "#d1d5db"

  light_color_presets:
    warm_rgb: [245, 158, 11]
    neutral_rgb: [243, 244, 246]
    cool_rgb: [191, 219, 254]

# Optional: alternate dark theme example
seagull_room_theme_dark:
  name: "dark"

  card:
    background_color: "#111827"
    border_color: "#374151"
    icon_color: "#93c5fd66"

  text:
    color: "#e5e7eb"
    background_color: "transparent"

  buttons:
    icon_only:
      background: "#374151"
      icon_color: "#cbd5e1"

    unavailable:
      background: "#4b5563"
      icon_color: "#9ca3af"

    toggle:
      active:
        background: "#f59e0b"
        icon_color: "#111827"
      inactive:
        background: "#1f2937"
        icon_color: "#e5e7eb"

    non_toggle:
      active:
        background: "#3b82f6"
        icon_color: "#eff6ff"
      inactive:
        background: "#334155"
        icon_color: "#f1f5f9"

    border:
      default_color: "transparent"

  obsolete:
    border: 2
    border_color: "#64748b"
