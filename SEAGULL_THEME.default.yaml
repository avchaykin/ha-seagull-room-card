# Default Seagull Room theme (palette + mapping)
#
# palette: named colors
# mapping: where colors are applied (card, text, buttons)
#
# Hierarchy for buttons in mapping.buttons:
# 1) base state buckets on buttons level (active/inactive/unavailable/state/state_value)
# 2) domain override (mapping.buttons.domains.<domain>)
# 3) entity override (mapping.buttons.entities.<entity_id>)
# 4) template rules (mapping.buttons.rules[])

palette:
  card_bg: "#eeeeee"
  card_border: "#aaaaaa"
  card_icon: "#2233aa44"

  text_color: "inherit"
  text_bg: "transparent"

  btn_unavailable_bg: "#6b7280"
  btn_unavailable_icon: "#d1d5db"

  btn_toggle_active_bg: "#f59e0b"
  btn_toggle_inactive_bg: "#4b5563"
  btn_toggle_active_icon: "#111827"
  btn_toggle_inactive_icon: "#e5e7eb"

  btn_non_toggle_active_bg: "#3b82f6"
  btn_non_toggle_inactive_bg: "#d1d5db"
  btn_non_toggle_active_icon: "#eaf2ff"
  btn_non_toggle_inactive_icon: "#111827"

  btn_icon_only_bg: "#d1d5db"
  btn_icon_only_icon: "#111827"

  btn_border_transparent: "transparent"
  obsolete_border: "#d1d5db"

mapping:
  card:
    background_color: card_bg
    border_color: card_border
    icon_color: card_icon

  text:
    color: text_color
    background_color: text_bg

  buttons:
    # Base for all buttons (with entity and no_entity)
    # Style keys supported at each hierarchy level: icon, color/icon_color, background, border_size, border_color
    active:
      # null => keep default icon resolution chain:
      # item.icon -> buttons.icon -> entity attributes.icon -> domain fallback icon
      icon: null
      background: btn_toggle_active_bg
      icon_color: btn_toggle_active_icon
    inactive:
      icon: null
      background: btn_toggle_inactive_bg
      icon_color: btn_toggle_inactive_icon
    unavailable:
      icon: null
      background: btn_unavailable_bg
      icon_color: btn_unavailable_icon

    # Optional exact state maps (state string -> style)
    state: {}
    state_value: {}

    border:
      size: 0
      default: btn_border_transparent

    # Domain-level overrides
    domains:
      light: {}
      lock: {}
      switch: {}
      # By default automation keeps old non_toggle behavior
      automation:
        active:
          icon: null
          background: btn_non_toggle_active_bg
          icon_color: btn_non_toggle_active_icon
        inactive:
          icon: null
          background: btn_non_toggle_inactive_bg
          icon_color: btn_non_toggle_inactive_icon
      # Pseudo-domain for icon-only buttons without entity
      no_entity:
        inactive:
          # null keeps item.icon/buttons.icon (for no_entity there is no entity icon fallback)
          icon: null
          background: btn_icon_only_bg
          icon_color: btn_icon_only_icon

    # Entity-level overrides
    entities: {}

    # Custom computed rules (templated condition)
    # Example:
    # rules:
    #   - when: "{{ entity === 'sensor.xxx' && Number(state) > 100 }}"
    #     style:
    #       background: btn_toggle_active_bg
    #       icon_color: btn_toggle_active_icon
    rules: []
