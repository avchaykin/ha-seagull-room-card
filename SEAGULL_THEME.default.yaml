# Seagull Room Card — DEFAULT THEME SPEC (draft)
#
# Purpose:
# - self-contained description of current visual defaults (as in seagull-room-card.js on main)
# - NO runtime wiring yet; documentation-only file
#
# Structure requested:
#   card, text, button
#
# Notes on parity with current code:
# - card.background_color here already includes opacity (rgba), replacing old split bg+opacity model
# - text border_* fields are included for target model, currently code uses radius only
# - button supports hierarchical + state-based style blocks; this file describes intended default mapping

card:
  border_radius: 16
  border_width: 0
  border_color: "#aaaaaa"
  background_color: "rgba(238, 238, 238, 0.45)" # #eeeeee + opacity 0.45
  icon: "mdi:sofa"
  icon_color: "#2233aa44"
  icon_size: 60

text:
  color: "inherit"
  background: "transparent"
  border_radius: 10
  border_width: 0
  border_color: "transparent"
  size: 14
  halign: "left"
  valign: "top"
  padding: 0
  padding_top: null
  padding_right: null
  padding_bottom: null
  padding_left: null

button:
  # layout
  align: "right" # left | right | center | justified
  size: 48
  gap: 5
  padding: 10
  padding_top: null
  padding_right: null
  padding_bottom: null
  padding_left: null

  # style hierarchy
  # 1) default (applies to all domains unless overridden)
  # 2) domain sections directly under `button` (e.g. light, lock, sensor, empty)
  #
  # for each level, style can be set in two ways:
  # - base keys (always): icon, color, background, border_size, border_color, border_radius
  # - state buckets: active/inactive/unavailable/obsolete/state_value/state/state_not_value/state_above/state_below
  #
  # icon:
  # - null => use entity icon fallback chain (item.icon -> buttons.icon -> entity.attributes.icon -> domain fallback)
  # - for empty (no entity) null means use item/icon-level icon (no entity fallback)

  default:
    icon: null
    color: null
    background: null
    border_size: 0
    border_color: "transparent"
    border_radius: null # null => fully round button (pill/circle)

    # Current default in code for toggle-capable domains
    # (and used as primary baseline here to avoid repeated domain overrides):
    active:
      color: "#111827"
      background: "#f59e0b"
    inactive:
      color: "#e5e7eb"
      background: "#4b5563"
    unavailable:
      color: "#d1d5db"
      background: "#6b7280"
    obsolete:
      # mirrors _resolveObsoleteConfig defaults when obsolete enabled
      border_size: 2
      border_color: "#d1d5db"

    # placeholders for extra state targeting
    state_value: {}
    state: {}
    state_not_value: {}
    state_above: {}
    state_below: {}

  # Explicit active/inactive mapping by domain.
  # Kept aligned with current card logic:
  # - toggle-capable domains => orange/gray
  # - all other domains => blue/light-gray

  # Toggle-capable domains (same as `default`)
  light:
    active: { color: "#111827", background: "#f59e0b" }
    inactive: { color: "#e5e7eb", background: "#4b5563" }
  switch:
    active: { color: "#111827", background: "#f59e0b" }
    inactive: { color: "#e5e7eb", background: "#4b5563" }
  input_boolean:
    active: { color: "#111827", background: "#f59e0b" }
    inactive: { color: "#e5e7eb", background: "#4b5563" }
  fan:
