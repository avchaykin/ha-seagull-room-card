    inactive: { color: "#e5e7eb", background: "#4b5563" }

  # Non-toggle domains
  alarm_control_panel:
    active: { color: "#eaf2ff", background: "#3b82f6" }
    inactive: { color: "#111827", background: "#d1d5db" }
  alert:
